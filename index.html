  <script>
    // ========== 从外部数据文件加载 ==========
    // 过滤未发布内容 (released: false 的条目不显示)
    const BASE_BALLS = GAME_DATA.baseBalls.filter(item => item.released !== false);
    const EVOLUTIONS = GAME_DATA.evolutions.filter(item => item.released !== false);
    const ADVANCED_EVOLUTIONS = GAME_DATA.advancedEvolutions.filter(item => item.released !== false);
    const BASE_ITEMS = GAME_DATA.baseItems.filter(item => item.released !== false);
    const PASSIVE_EVOLUTIONS = GAME_DATA.passiveEvolutions.filter(item => item.released !== false);

    // ========== 全局变量 ==========
    let currentView = 'matrix';
    let currentLang = 'zh'; // 默认中文
    let listGroupMode = 'material'; // 列表分组模式: material(按材料) / result(按结果)
    try {
      currentLang = localStorage.getItem('lang') || 'zh';
    } catch (e) {
      console.warn('无法读取 localStorage:', e);
    }
    const IMG_BASE = 'img/';
    let searchTimeout = null;

    // ========== 数据索引 (O(1) 查找) ==========
    const ballById = new Map();
    const ballByName = new Map();
    const evoByName = new Map();
    const itemByName = new Map();
    const evoMatrix = new Map();

    function buildIndexes() {
      BASE_BALLS.forEach(b => {
        ballById.set(b.id, b);
        ballByName.set(b.name, b);
      });
      EVOLUTIONS.forEach(e => evoByName.set(e.name, e));
      ADVANCED_EVOLUTIONS.forEach(e => evoByName.set(e.name, e));
      PASSIVE_EVOLUTIONS.forEach(e => evoByName.set(e.name, e));
      BASE_ITEMS.forEach(i => itemByName.set(i.name, i));
      // 矩阵索引: "ROW_COL" -> evolution
      EVOLUTIONS.forEach(e => {
        evoMatrix.set(`${e.row}_${e.col}`, e);
        evoMatrix.set(`${e.col}_${e.row}`, e);
      });
    }

    // ========== DOM 缓存 ==========
    const DOM = {};
    function cacheDOM() {
      DOM.tooltip = document.getElementById('tooltip');
      DOM.tooltipImg = document.getElementById('tooltipImg');
      DOM.tooltipTitle = document.getElementById('tooltipTitle');
      DOM.tooltipTitleCn = document.getElementById('tooltipTitleCn');
      DOM.tooltipEffect = document.getElementById('tooltipEffect');
      DOM.tooltipFormula = document.getElementById('tooltipFormula');
      DOM.tooltipMaterials = document.getElementById('tooltipMaterials');
      DOM.tooltipMeta = document.getElementById('tooltipMeta');
      DOM.tooltipTags = document.getElementById('tooltipTags');
      DOM.modalOverlay = document.getElementById('modalOverlay');
      DOM.modalImg = document.getElementById('modalImg');
      DOM.modalTitle = document.getElementById('modalTitle');
      DOM.modalTitleCn = document.getElementById('modalTitleCn');
      DOM.modalEffect = document.getElementById('modalEffect');
      DOM.modalFormula = document.getElementById('modalFormula');
      DOM.modalMeta = document.getElementById('modalMeta');
      DOM.modalMetaSection = document.getElementById('modalMetaSection');
      DOM.searchInput = document.getElementById('searchInput');
      DOM.matrixTable = document.getElementById('matrixTable');
      DOM.listContainer = document.getElementById('listContainer');
      DOM.galleryBasic = document.getElementById('galleryBasic');
      DOM.galleryEvolved = document.getElementById('galleryEvolved');
      DOM.galleryAdvanced = document.getElementById('galleryAdvanced');
      DOM.galleryBaseItems = document.getElementById('galleryBaseItems');
      DOM.galleryPassive = document.getElementById('galleryPassive');
      DOM.advancedGrid = document.getElementById('advancedGrid');
      DOM.passiveGrid = document.getElementById('passiveGrid');
      DOM.advancedSection = document.getElementById('advancedSection');
      DOM.passiveSection = document.getElementById('passiveSection');
      DOM.filterBar = document.getElementById('filterBar');
    }

    // ========== 当前筛选状态 ==========
    let currentFilter = 'all';

    // ========== 视图渲染状态追踪 ==========
    // 记录每个视图是否已渲染, 避免重复渲染
    const viewRendered = {
      matrix: false,
      list: false,
      gallery: false,
      strategy: false
    };

    // ========== 生成标签 HTML ==========
    function buildTagsHtml(item, size = 'normal') {
      if (!item.tags || item.tags.length === 0) return '';
      const cls = size === 'mini' ? 'mini-tag' : 'tag';
      return item.tags.map(tag => 
        `<span class="${cls} tag-${tag.id}" style="background-color: ${tag.color}">${getTagName(tag)}</span>`
      ).join('');
    }

    // ========== 生成伤害类型 HTML ==========
    // 过滤掉与状态效果重复的伤害类型 (同名元素只在状态效果区显示)
    function buildDamageTypesHtml(item) {
      // 获取伤害类型列表
      let types = [];
      if (item.damageType) types.push(item.damageType);
      if (item.damageTypes) types = types.concat(item.damageTypes);
      if (types.length === 0) return '';
      
      // 去重
      let unique = [...new Map(types.map(t => [t.id, t])).values()];
      
      // 过滤掉与状态效果名称重复的伤害类型
      if (item.statusEffects && item.statusEffects.length > 0) {
        const statusIds = new Set(item.statusEffects.map(s => s.id));
        unique = unique.filter(t => !statusIds.has(t.id));
      }
      
      if (unique.length === 0) return '';
      return `<div class="damage-types">${unique.map(t => 
        `<span class="damage-type"><span class="icon">${t.icon}</span>${getDamageTypeName(t)}</span>`
      ).join('')}</div>`;
    }

    // ========== 生成状态效果 HTML ==========
    function buildStatusEffectsHtml(item) {
      if (!item.statusEffects || item.statusEffects.length === 0) return '';
      // 去重
      const unique = [...new Map(item.statusEffects.map(s => [s.id, s])).values()];
      return `<div class="status-effects">${unique.map(s => 
        `<span class="status-effect" title="${getStatusEffectDesc(s)}"><span class="icon">${s.icon}</span>${getStatusEffectName(s)}</span>`
      ).join('')}</div>`;
    }

    // ========== 生成AOE类型 HTML ==========
    function buildAoeHtml(item) {
      if (!item.aoeType) return '';
      const aoe = item.aoeType;
      return `<div class="aoe-badge"><span class="icon">${aoe.icon}</span>${getAoeTypeName(aoe)}: ${getAoeTypeDesc(aoe)}</div>`;
    }

    // ========== 检查item是否匹配筛选 ==========
    function matchesFilter(item, filter) {
      if (filter === 'all') return true;
      if (!item.tags) return false;
      return item.tags.some(tag => tag.id === filter);
    }

    // ========== 工具函数 ==========
    function getImg(filename) {
      return IMG_BASE + (filename || 'ball_icon_bleed.png');
    }

    // 转义撇号, 仅用于内联 JavaScript 字符串
    // 正确用法: onclick="func('${safeName(name)}')"
    // 错误用法: data-evo="${safeName(name)}"  (data-* 属性不需要转义!)
    // 原因: data-* 属性值会被浏览器原样保存, 转义字符会变成字面字符
    function safeName(str) {
      return str ? str.replace(/'/g, "\\'") : '';
    }

    // 生成图片 HTML
    function imgHtml(src, alt, className) {
      const cls = className ? ` class="${className}"` : '';
      return `<img${cls} src="${getImg(src)}" alt="${alt || ''}" onerror="this.style.visibility='hidden'; this.onerror=null;">`;
    }

    // ========== 语言相关函数 ==========
    function getName(item) {
      if (currentLang === 'en') {
        return item.name;
      }
      return item.nameCn || item.name;
    }

    const PERCENT_EFFECT_KEYS = new Set([
      'acceleration',
      'base_speed',
      'overheal_efficiency',
      'peak_speed'
    ]);
    const MULTIPLIER_EFFECT_KEYS = new Set(['damage_multiplier', 'follower_mult']);

    function trimNumber(value) {
      if (Number.isInteger(value)) return String(value);
      return value.toFixed(2).replace(/\.?0+$/, '');
    }

    function isPercentEffectKey(key) {
      return PERCENT_EFFECT_KEYS.has(key)
        || key.endsWith('_pct')
        || key.endsWith('_chance');
    }

    function formatEffectValue(key, rawValue, template, endIndex) {
      const value = Number(rawValue);
      if (!Number.isFinite(value)) return String(rawValue);

      if (MULTIPLIER_EFFECT_KEYS.has(key)) {
        return trimNumber(value / 100);
      }

      const displayValue = key === 'damage_pct_tenth' ? value / 10 : value;
      const displayText = trimNumber(displayValue);
      if (isPercentEffectKey(key) && template[endIndex] !== '%') {
        return `${displayText}%`;
      }
      return displayText;
    }

    function formatEffectText(template, item) {
      if (!template || !item) return template || '';
      const props = (window.EFFECT_PROPERTIES && window.EFFECT_PROPERTIES[item.name]) || {};
      return template.replace(/\{\[([A-Za-z0-9_]+)\]\}/g, (token, key, offset) => {
        if (!Object.prototype.hasOwnProperty.call(props, key)) {
          return token;
        }
        return formatEffectValue(key, props[key], template, offset + token.length);
      });
    }

    function getEffect(item) {
      const template = currentLang === 'en'
        ? (item.effect || item.effectCn || '')
        : (item.effectCn || item.effect || '');
      return formatEffectText(template, item);
    }

    // 获取标签名称
    function getTagName(tag) {
      if (currentLang === 'en') {
        return tag.name;
      }
      return tag.nameCn || tag.name;
    }

    // 获取伤害类型名称
    function getDamageTypeName(type) {
      if (currentLang === 'en') {
        return type.name;
      }
      return type.nameCn || type.name;
    }

    // 获取状态效果名称
    function getStatusEffectName(effect) {
      if (currentLang === 'en') {
        return effect.name;
      }
      return effect.nameCn || effect.name;
    }

    // 获取状态效果描述
    function getStatusEffectDesc(effect) {
      if (currentLang === 'en') {
        return effect.desc || effect.descCn || '';
      }
      return effect.descCn || effect.desc || '';
    }

    // 获取 AOE 类型名称
    function getAoeTypeName(aoe) {
      if (currentLang === 'en') {
        return aoe.name;
      }
      return aoe.nameCn || aoe.name;
    }

    // 获取 AOE 类型描述
    function getAoeTypeDesc(aoe) {
      if (currentLang === 'en') {
        return aoe.desc || aoe.descCn || '';
      }
      return aoe.descCn || aoe.desc || '';
    }

    // 更新界面文字
    function updateUIText() {
      // 确保 I18N 对象存在
      if (typeof I18N === 'undefined') {
        console.error('I18N 对象未定义, 请检查 i18n.js 是否正确加载');
        return;
      }
      
      const texts = I18N[currentLang];
      if (!texts) {
        console.error('语言配置不存在:', currentLang);
        return;
      }
      
      // 更新所有带 data-i18n 属性的元素
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (texts[key]) {
          el.textContent = texts[key];
        }
      });
      
      // 更新 placeholder
      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const key = el.dataset.i18nPlaceholder;
        if (texts[key]) {
          el.placeholder = texts[key];
        }
      });
      
      // 更新语言切换按钮文字
      const langBtn = document.getElementById('langSwitch');
      if (langBtn && texts.langSwitch) {
        langBtn.textContent = texts.langSwitch;
      }
      
      // 更新页面标题
      if (texts.title) {
        document.title = texts.title;
      }
    }

    // 切换语言
    function switchLanguage() {
      currentLang = currentLang === 'zh' ? 'en' : 'zh';
      localStorage.setItem('lang', currentLang);
      
      // 更新界面文字
      updateUIText();
      
      // 重新渲染所有视图
      renderAll();
      
      // 重新应用当前筛选
      applyFilter(currentFilter);
    }

    function getBaseBall(id) {
      return ballById.get(id);
    }

    function getBaseItem(name) {
      return itemByName.get(name);
    }

    function getEvolution(name) {
      return evoByName.get(name);
    }

    function findEvolution(rowId, colId) {
      return evoMatrix.get(`${rowId}_${colId}`);
    }

    // 统一查找组件 (基础球/进化球/装备)
    function findComponent(name) {
      return ballByName.get(name) || evoByName.get(name) || itemByName.get(name);
    }

    // 获取组件名称 (根据当前语言)
    function getComponentName(name) {
      const comp = findComponent(name);
      if (!comp) return name;
      return getName(comp);
    }

    // 计算高级进化所需的基础球及数量
    // 返回: Map<ballId, { ball: baseBall, count: number }>
    function getBaseMaterials(evo) {
      const materials = new Map();
      
      if (!evo.components) return materials;
      
      evo.components.forEach(compName => {
        // 先检查是否是基础球
        const baseBall = ballByName.get(compName);
        if (baseBall) {
          // 是基础球, 直接计数
          const id = baseBall.id;
          if (materials.has(id)) {
            materials.get(id).count++;
          } else {
            materials.set(id, { ball: baseBall, count: 1 });
          }
          return;
        }
        
        // 不是基础球, 查找进化球
        const evolution = evoByName.get(compName);
        if (evolution && evolution.row && evolution.col) {
          // 是进化球, 获取其两个基础球组件
          [evolution.row, evolution.col].forEach(ballId => {
            const ball = ballById.get(ballId);
            if (ball) {
              if (materials.has(ballId)) {
                materials.get(ballId).count++;
              } else {
                materials.set(ballId, { ball: ball, count: 1 });
              }
            }
          });
        }
      });
      
      return materials;
    }

    // 生成基础原料 HTML (仅高级进化使用)
    function buildBaseMaterialsHtml(evo) {
      const materials = getBaseMaterials(evo);
      if (materials.size === 0) return '';
      
      let itemsHtml = '';
      
      materials.forEach(({ ball, count }) => {
        const displayName = getName(ball);
        itemsHtml += `<span class="base-material-item">
          <img src="${getImg(ball.img)}" alt="${ball.name}">
          <span>${displayName}</span>
          <span class="count">×${count}</span>
        </span>`;
      });
      
      return `<div class="base-materials">${itemsHtml}</div>`;
    }

    // 生成直接原料 HTML (进化球组件, 带图标)
    function buildDirectComponentsHtml(evo) {
      if (!evo.components || evo.components.length === 0) return '';
      
      let itemsHtml = '';
      
      evo.components.forEach((compName, i) => {
        const comp = findComponent(compName);
        if (comp) {
          itemsHtml += `<span class="base-material-item">
            <img src="${getImg(comp.img)}" alt="${comp.name}">
            <span>${getName(comp)}</span>
          </span>`;
        } else {
          itemsHtml += `<span class="base-material-item"><span>${compName}</span></span>`;
        }
      });
      
      return `<div class="base-materials direct-components">${itemsHtml}</div>`;
    }

    // 检查是否为高级进化 (组件是进化球, 而非基础装备)
    function isAdvancedEvolution(evo) {
      if (!evo.components || evo.components.length === 0) return false;
      // 检查第一个组件是否为进化球
      return evoByName.has(evo.components[0]);
    }

    // ========== 矩阵视图 ==========
    function renderMatrix() {
      let html = '<tr><th></th>';
      
      // 表头
      BASE_BALLS.forEach(ball => {
        html += `<th data-id="${ball.id}" data-type="base">
          ${imgHtml(ball.img, ball.name)}
          <span>${getName(ball)}</span>
        </th>`;
      });
      html += '</tr>';

      // 表体
      BASE_BALLS.forEach(rowBall => {
        html += `<tr><th data-id="${rowBall.id}" data-type="base">
          ${imgHtml(rowBall.img, rowBall.name)}
          <span>${getName(rowBall)}</span>
        </th>`;

        BASE_BALLS.forEach(colBall => {
          const evo = findEvolution(rowBall.id, colBall.id);
          if (evo) {
            html += `<td class="matrix-cell" data-evo="${evo.name}" data-type="evo">
              ${imgHtml(evo.img, evo.name)}
              <div class="cell-name">${getName(evo)}${evo.alt ? '*' : ''}</div>
            </td>`;
          }
          else {
            html += `<td class="matrix-cell empty"></td>`;
          }
        });

        html += '</tr>';
      });

      DOM.matrixTable.innerHTML = html;
    }

    // ========== 列表视图 ==========
    function renderList() {
      if (listGroupMode === 'result') {
        renderListByResult();
      }
      else {
        renderListByMaterial();
      }
    }

    // 按材料分组渲染列表
    function renderListByMaterial() {
      let html = '';
      const combosText = (I18N && I18N[currentLang]) ? I18N[currentLang].combosCount : '种组合';

      BASE_BALLS.forEach(baseBall => {
        const combos = EVOLUTIONS.filter(e => e.row === baseBall.id || e.col === baseBall.id);
        if (combos.length === 0) return;

        html += `<div class="list-card">
          <div class="list-card-header">
            ${imgHtml(baseBall.img, baseBall.name)}
            <div>
              <h3>${getName(baseBall)}</h3>
              <div class="subtitle">${combos.length} ${combosText}</div>
            </div>
          </div>
          <div class="list-card-body">`;

        combos.forEach(evo => {
          const partnerId = evo.row === baseBall.id ? evo.col : evo.row;
          const partner = getBaseBall(partnerId);
          if (!partner) return;
          const tagsData = evo.tags ? evo.tags.map(t => t.id).join(',') : '';

          html += `<div class="combo-item" data-evo="${evo.name}" data-tags="${tagsData}">
            <div class="combo-text">
              ${imgHtml(baseBall.img, baseBall.name)}<span class="partner">${getName(baseBall)}</span>
              <span class="plus"> + </span>
              ${imgHtml(partner.img, partner.name)}<span class="partner">${getName(partner)}</span>
              <span class="arrow">→</span>
              ${imgHtml(evo.img, evo.name)}<span class="result">${getName(evo)}${evo.alt ? '*' : ''}</span>
            </div>
          </div>`;
        });

        html += '</div></div>';
      });

      DOM.listContainer.innerHTML = html;
    }

    // 按结果分组渲染列表
    function renderListByResult() {
      let html = '';
      const recipesText = (I18N && I18N[currentLang]) ? I18N[currentLang].recipesCount : '种配方';

      // 按进化球名称分组
      const evoGroups = new Map();
      EVOLUTIONS.forEach(evo => {
        const name = evo.name;
        if (!evoGroups.has(name)) {
          evoGroups.set(name, []);
        }
        evoGroups.get(name).push(evo);
      });

      // 渲染每个进化球的卡片
      evoGroups.forEach((recipes, evoName) => {
        const firstEvo = recipes[0];
        const hasAlt = recipes.length > 1;

        html += `<div class="list-card">
          <div class="list-card-header">
            ${imgHtml(firstEvo.img, firstEvo.name)}
            <div>
              <h3>${getName(firstEvo)}${hasAlt ? '*' : ''}</h3>
              <div class="subtitle">${recipes.length} ${recipesText}</div>
            </div>
          </div>
          <div class="list-card-body">`;

        recipes.forEach(evo => {
          const ball1 = getBaseBall(evo.row);
          const ball2 = getBaseBall(evo.col);
          if (!ball1 || !ball2) return;
          const tagsData = evo.tags ? evo.tags.map(t => t.id).join(',') : '';

          html += `<div class="combo-item" data-evo="${evo.name}" data-tags="${tagsData}">
            <div class="combo-text">
              ${imgHtml(ball1.img, ball1.name)}<span class="partner">${getName(ball1)}</span>
              <span class="plus"> + </span>
              ${imgHtml(ball2.img, ball2.name)}<span class="partner">${getName(ball2)}</span>
              <span class="arrow">→</span>
              ${imgHtml(evo.img, evo.name)}<span class="result">${getName(evo)}</span>
            </div>
          </div>`;
        });

        html += '</div></div>';
      });

      DOM.listContainer.innerHTML = html;
    }

    // ========== 图鉴视图 ==========
    // 生成图鉴项 HTML
    // 注意: data-* 属性使用原始值, 不需要 safeName() 转义
    function galleryItemHtml(item, type, idOrName) {
      let dataAttr;
      if (type === 'base') {
        dataAttr = `data-id="${idOrName}"`;
      }
      else if (type === 'item') {
        dataAttr = `data-item="${idOrName}"`;
      }
      else {
        dataAttr = `data-evo="${idOrName}"`;
      }
      // 使用预计算的 tagsData, 避免渲染时重复计算
      const tagsData = item.tagsData || '';
      const tagsHtml = buildTagsHtml(item, 'mini');
      // 根据语言显示名称 (只显示当前语言)
      const displayName = getName(item);
      return `<div class="gallery-item" ${dataAttr} data-type="${type}" data-tags="${tagsData}">
        ${imgHtml(item.img, item.name)}
        <div class="item-name">${displayName}</div>
        ${tagsHtml ? `<div class="item-tags">${tagsHtml}</div>` : ''}
      </div>`;
    }

    function renderGallery() {
      // 基础球
      DOM.galleryBasic.innerHTML = BASE_BALLS.map(b => galleryItemHtml(b, 'base', b.id)).join('');

      // 进化球 (去重)
      const uniqueEvos = [...new Map(EVOLUTIONS.map(e => [e.name, e])).values()];
      DOM.galleryEvolved.innerHTML = uniqueEvos.map(e => galleryItemHtml(e, 'evo', e.name)).join('');

      // 高级进化 (去重)
      const uniqueAdvanced = [...new Map(ADVANCED_EVOLUTIONS.map(e => [e.name, e])).values()];
      DOM.galleryAdvanced.innerHTML = uniqueAdvanced.map(e => galleryItemHtml(e, 'evo', e.name)).join('');

      // 基础被动道具
      DOM.galleryBaseItems.innerHTML = BASE_ITEMS.map(i => galleryItemHtml(i, 'item', i.name)).join('');

      // 被动道具进化 (去重)
      const uniquePassive = [...new Map(PASSIVE_EVOLUTIONS.map(e => [e.name, e])).values()];
      DOM.galleryPassive.innerHTML = uniquePassive.map(e => galleryItemHtml(e, 'evo', e.name)).join('');
    }

    // ========== 策略视图 ==========
    let currentStrategyFilter = 'all';

    // 根据球名称查找球数据
    function findBallData(ballName) {
      // 先从基础球中查找 (使用 id 或 name)
      let ball = BASE_BALLS.find(b => b.id === ballName || b.name === ballName);
      if (ball) return { data: ball, type: 'base' };
      
      // 从进化球中查找
      ball = EVOLUTIONS.find(e => e.name === ballName);
      if (ball) return { data: ball, type: 'evo' };
      
      // 从高级进化中查找
      ball = ADVANCED_EVOLUTIONS.find(e => e.name === ballName);
      if (ball) return { data: ball, type: 'evo' };
      
      // 从被动道具进化中查找
      ball = PASSIVE_EVOLUTIONS.find(e => e.name === ballName);
      if (ball) return { data: ball, type: 'passive' };
      
      // 从基础道具中查找
      ball = BASE_ITEMS.find(e => e.name === ballName);
      if (ball) return { data: ball, type: 'item' };
      
      return null;
    }

    // 生成策略卡片中的球元素 HTML
    function strategyBallHtml(ballName, role, roleCn, isCore) {
      const ballInfo = findBallData(ballName);
      if (!ballInfo) {
        return `<div class="strategy-ball ${isCore ? 'core' : ''}">
          <span class="strategy-ball-name">${ballName}</span>
        </div>`;
      }
      
      const { data, type } = ballInfo;
      const displayName = getName(data);
      const displayRole = currentLang === 'zh' ? roleCn : role;
      
      // 根据类型设置正确的数据属性
      let dataAttr = '';
      if (type === 'base') {
        dataAttr = `data-id="${data.id}"`;
      }
      else if (type === 'evo') {
        dataAttr = `data-evo="${data.name}"`;
      }
      else if (type === 'passive') {
        dataAttr = `data-passive="${data.name}"`;
      }
      else if (type === 'item') {
        dataAttr = `data-item="${data.name}"`;
      }
      
      return `<div class="strategy-ball ${isCore ? 'core' : ''}" ${dataAttr} data-type="${type}">
        ${imgHtml(data.img, data.name)}
        <div>
          <div class="strategy-ball-name">${displayName}</div>
          ${displayRole ? `<div class="strategy-ball-role">${displayRole}</div>` : ''}
        </div>
      </div>`;
    }

    // 生成策略卡片 HTML
    function strategyCardHtml(strategy) {
      const t = I18N[currentLang];
      const name = currentLang === 'zh' ? strategy.nameCn : strategy.name;
      const desc = currentLang === 'zh' ? strategy.descCn : strategy.desc;
      
      // 难度和强度星星
      const difficultyStars = '★'.repeat(strategy.difficulty) + '☆'.repeat(3 - strategy.difficulty);
      const ratingStars = '★'.repeat(strategy.rating) + '☆'.repeat(5 - strategy.rating);
      
      // 核心球
      const coreBallsHtml = strategy.core.map(ballName => {
        const mech = strategy.mechanism.find(m => m.ball === ballName);
        return strategyBallHtml(ballName, mech?.role || '', mech?.roleCn || '', true);
      }).join('');
      
      // 协同球
      const synergyBallsHtml = strategy.synergy.map(ballName => {
        const mech = strategy.mechanism.find(m => m.ball === ballName);
        return strategyBallHtml(ballName, mech?.role || '', mech?.roleCn || '', false);
      }).join('');
      
      // 机制说明
      const mechanismHtml = strategy.mechanism.map(m => {
        const role = currentLang === 'zh' ? m.roleCn : m.role;
        // 获取球的本地化名称
        const ballInfo = findBallData(m.ball);
        const ballDisplayName = ballInfo ? getName(ballInfo.data) : m.ball;
        return `<div class="mechanism-item">
          <span class="mechanism-ball-name">${ballDisplayName}:</span> ${role}
        </div>`;
      }).join('');
      
      return `<div class="strategy-card" data-type="${strategy.type.id}">
        <div class="strategy-header">
          <div class="strategy-title">
            <div class="strategy-type-badge" style="background: ${strategy.type.color}20; color: ${strategy.type.color}">
              ${getTypeIcon(strategy.type.id)}
            </div>
            <div>
              <div class="strategy-name">${name}</div>
            </div>
          </div>
          <div class="strategy-meta">
            <div class="strategy-difficulty">${t.strategyDifficulty}: <span class="strategy-stars">${difficultyStars}</span></div>
            <div class="strategy-rating">${t.strategyRating}: <span class="strategy-stars">${ratingStars}</span></div>
          </div>
        </div>
        <div class="strategy-body">
          <div class="strategy-desc">${desc}</div>
          
          <div class="strategy-balls-section">
            <div class="strategy-balls-title">${t.strategyCore}</div>
            <div class="strategy-balls">${coreBallsHtml}</div>
          </div>
          
          <div class="strategy-balls-section">
            <div class="strategy-balls-title">${t.strategySynergy}</div>
            <div class="strategy-balls">${synergyBallsHtml}</div>
          </div>
          
          <div class="strategy-mechanism">
            <div class="strategy-mechanism-title">${t.strategyMechanism}</div>
            <div class="mechanism-list">${mechanismHtml}</div>
          </div>
        </div>
      </div>`;
    }

    // 获取策略类型图标
    function getTypeIcon(typeId) {
      const icons = {
        dmgAmp: '⚔️',
        sustain: '❤️',
        control: '🔒',
        aoeCombo: '💥',
        dotStack: '🩸',
        summonArmy: '👾'
      };
      return icons[typeId] || '🎯';
    }

    // 渲染策略筛选按钮
    function renderStrategyFilters() {
      const t = I18N[currentLang];
      const filters = [
        { id: 'all', label: t.filterAll, icon: '🎯' },
        { id: 'dmgAmp', label: t.filterDmgAmp, icon: '⚔️', color: SYNERGY_TYPE.DAMAGE_AMP.color },
        { id: 'sustain', label: t.filterSustain, icon: '❤️', color: SYNERGY_TYPE.SUSTAIN.color },
        { id: 'control', label: t.filterControl, icon: '🔒', color: SYNERGY_TYPE.CONTROL.color },
        { id: 'aoeCombo', label: t.filterAoeCombo, icon: '💥', color: SYNERGY_TYPE.AOE_COMBO.color },
        { id: 'dotStack', label: t.filterDotStack, icon: '🩸', color: SYNERGY_TYPE.DOT_STACK.color },
        { id: 'summonArmy', label: t.filterSummonArmy, icon: '👾', color: SYNERGY_TYPE.SUMMON_ARMY.color }
      ];
      
      const filtersContainer = document.getElementById('strategyFilters');
      filtersContainer.innerHTML = filters.map(f => {
        const activeClass = f.id === currentStrategyFilter ? 'active' : '';
        const style = f.color && f.id === currentStrategyFilter ? `background: ${f.color}; border-color: ${f.color};` : '';
        return `<button class="strategy-filter-btn ${activeClass}" data-filter="${f.id}" style="${style}"><span class="icon">${f.icon}</span><span>${f.label}</span></button>`;
      }).join('');
      
      // 绑定筛选事件
      filtersContainer.querySelectorAll('.strategy-filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          currentStrategyFilter = btn.dataset.filter;
          renderStrategyFilters();
          renderStrategyGrid();
        });
      });
    }

    // 渲染策略卡片网格
    function renderStrategyGrid() {
      const grid = document.getElementById('strategyGrid');
      const filtered = currentStrategyFilter === 'all' 
        ? STRATEGIES 
        : STRATEGIES.filter(s => s.type.id === currentStrategyFilter);
      
      grid.innerHTML = filtered.map(s => strategyCardHtml(s)).join('');
      
      // 为策略卡片中的球元素绑定点击事件
      grid.querySelectorAll('.strategy-ball[data-id], .strategy-ball[data-evo], .strategy-ball[data-item], .strategy-ball[data-passive]').forEach(el => {
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = el.dataset.id;
          const evoName = el.dataset.evo;
          const itemName = el.dataset.item;
          const passiveName = el.dataset.passive;
          
          // 使用 openModal, 它支持通过 id 或 name 查找基础球和进化球
          if (id) {
            openModal(id);
          }
          else if (evoName) {
            openModal(evoName);
          }
          else if (itemName) {
            openModal(itemName);
          }
          else if (passiveName) {
            openModal(passiveName);
          }
        });
      });
    }

    // 渲染策略视图
    function renderStrategy() {
      renderStrategyFilters();
      renderStrategyGrid();
    }

    // ========== 高级/被动进化区 ==========
    // 生成单个配方的组件 HTML
    function buildRecipeComponentsHtml(components) {
      if (!components || components.length === 0) return '';
      
      let itemsHtml = '';
      components.forEach((compName) => {
        const comp = findComponent(compName);
        if (comp) {
          itemsHtml += `<span class="base-material-item">
            <img src="${getImg(comp.img)}" alt="${comp.name}">
            <span>${getName(comp)}</span>
          </span>`;
        } else {
          itemsHtml += `<span class="base-material-item"><span>${compName}</span></span>`;
        }
      });
      
      return itemsHtml;
    }

    // 生成高级卡片 HTML
    // 注意: data-evo 使用原始值, 不需要 safeName() 转义
    function advancedCardHtml(evo) {
      // 使用预计算的 tagsData, 避免渲染时重复计算
      const tagsData = evo.tagsData || '';
      const tagsHtml = buildTagsHtml(evo, 'mini');
      
      let materialsHtml = '';
      
      // 检查是否有多个配方 (allRecipes)
      const recipes = evo.allRecipes || [evo.components];
      
      recipes.forEach((recipe, idx) => {
        const recipeHtml = buildRecipeComponentsHtml(recipe);
        if (recipes.length > 1) {
          // 多配方: 每个配方单独一行, 加上配方编号
          materialsHtml += `<div class="base-materials direct-components recipe-row">
            <span class="recipe-label">配方${idx + 1}:</span>${recipeHtml}
          </div>`;
        } else {
          // 单配方: 原有样式
          materialsHtml += `<div class="base-materials direct-components">${recipeHtml}</div>`;
        }
      });
      
      // 高级进化还需要显示基础原料
      if (isAdvancedEvolution(evo)) {
        materialsHtml += buildBaseMaterialsHtml(evo);
      }
      
      return `<div class="advanced-card" data-evo="${evo.name}" data-type="evo" data-tags="${tagsData}">
        ${imgHtml(evo.img, evo.name)}
        <div class="advanced-card-info">
          <h4>${getName(evo)}</h4>
          ${materialsHtml}
          ${tagsHtml ? `<div class="tags-container">${tagsHtml}</div>` : ''}
        </div>
      </div>`;
    }

    // 合并同名进化的所有配方
    function mergeEvolutionRecipes(evolutions) {
      const merged = new Map();
      evolutions.forEach(evo => {
        if (merged.has(evo.name)) {
          // 已存在, 添加配方
          merged.get(evo.name).allRecipes.push(evo.components);
        } else {
          // 新条目, 复制并添加配方数组
          merged.set(evo.name, { ...evo, allRecipes: [evo.components] });
        }
      });
      return Array.from(merged.values());
    }

    function renderAdvancedSections() {
      // 合并同名进化的不同配方
      const mergedAdvanced = mergeEvolutionRecipes(ADVANCED_EVOLUTIONS);
      const mergedPassive = mergeEvolutionRecipes(PASSIVE_EVOLUTIONS);
      DOM.advancedGrid.innerHTML = mergedAdvanced.map(advancedCardHtml).join('');
      DOM.passiveGrid.innerHTML = mergedPassive.map(advancedCardHtml).join('');
    }

    // ========== 悬浮提示框 ==========
    // 构建配方 HTML
    function buildFormulaHtml(item) {
      let html = '';
      
      if (item.row && item.col) {
        // 基础进化: 查找所有同名配方 (可能有多个替代配方)
        const allRecipes = EVOLUTIONS.filter(e => e.name === item.name);
        
        allRecipes.forEach((recipe, idx) => {
          const ball1 = getBaseBall(recipe.row);
          const ball2 = getBaseBall(recipe.col);
          
          // 每条配方用div包裹, 使其独占一行
          html += '<div class="tooltip-formula-row">';
          if (ball1) html += `<img src="${getImg(ball1.img)}"><span>${getName(ball1)}</span>`;
          html += '<span class="plus">+</span>';
          if (ball2) html += `<img src="${getImg(ball2.img)}"><span>${getName(ball2)}</span>`;
          html += '<span class="equals">=</span>';
          html += `<img src="${getImg(item.img)}"><span>${getName(item)}</span>`;
          html += '</div>';
        });
      }
      else if (item.components) {
        // 高级/被动进化: 多个组件
        html += '<div class="tooltip-formula-row">';
        item.components.forEach((comp, i) => {
          const c = findComponent(comp);
          if (c) {
            html += `<img src="${getImg(c.img)}"><span>${getName(c)}</span>`;
          }
          else {
            html += `<span>${comp}</span>`;
          }
          if (i < item.components.length - 1) html += '<span class="plus">+</span>';
        });
        html += '<span class="equals">=</span>';
        html += `<img src="${getImg(item.img)}"><span>${getName(item)}</span>`;
        html += '</div>';
      }
      
      return html;
    }

    // 计算 tooltip 位置 (动态获取实际尺寸, 优化移动端显示)
    function calcTooltipPosition(targetRect, tooltipRect) {
      const padding = 10;
      const viewportWidth = window.innerWidth;
      const viewportHeight = window.innerHeight;
      const isMobile = viewportWidth < 768;
      
      let left, top;
      
      // 移动端: 水平位置由 CSS 控制, 只计算垂直位置
      if (isMobile) {
        left = padding; // CSS 会用 !important 覆盖
        
        // 优先放在上方
        const spaceAbove = targetRect.top;
        const spaceBelow = viewportHeight - targetRect.bottom;
        
        if (spaceAbove >= tooltipRect.height + padding) {
          top = targetRect.top - tooltipRect.height - padding;
        } else if (spaceBelow >= tooltipRect.height + padding) {
          top = targetRect.bottom + padding;
        } else {
          // 空间都不够, 选择空间大的一侧
          if (spaceAbove > spaceBelow) {
            top = padding;
          } else {
            top = viewportHeight - tooltipRect.height - padding;
          }
        }
      } else {
        // 桌面端: 优先放在右侧
        left = targetRect.right + padding;
        top = targetRect.top;
        
        // 右侧放不下, 尝试左侧
        if (left + tooltipRect.width > viewportWidth - padding) {
          left = targetRect.left - tooltipRect.width - padding;
        }
        // 左侧也放不下, 放在目标下方
        if (left < padding) {
          left = Math.max(padding, targetRect.left);
          top = targetRect.bottom + padding;
        }
        
        // 确保不超出右边界
        if (left + tooltipRect.width > viewportWidth - padding) {
          left = viewportWidth - tooltipRect.width - padding;
        }
        // 确保不超出左边界
        if (left < padding) left = padding;
      }
      
      // 确保不超出下边界
      if (top + tooltipRect.height > viewportHeight - padding) {
        top = viewportHeight - tooltipRect.height - padding;
      }
      // 确保不超出上边界
      if (top < padding) top = padding;

      return { left, top };
    }

    function showTooltip(event, name, type) {
      let item;
      if (type === 'base') {
        item = getBaseBall(name);
      }
      else if (type === 'item') {
        item = getBaseItem(name);
      }
      else {
        item = getEvolution(name);
      }
      if (!item) return;

      // 填充内容 (使用缓存的 DOM)
      DOM.tooltipImg.src = getImg(item.img);
      // 只显示当前语言的名称
      DOM.tooltipTitle.textContent = getName(item);
      DOM.tooltipTitleCn.textContent = '';
      DOM.tooltipEffect.textContent = getEffect(item);

      // 元数据 (伤害类型, 状态效果, AOE)
      let metaHtml = buildDamageTypesHtml(item) + buildStatusEffectsHtml(item) + buildAoeHtml(item);
      DOM.tooltipMeta.innerHTML = metaHtml;
      DOM.tooltipMeta.style.display = metaHtml ? 'block' : 'none';

      // 标签
      const tagsHtml = buildTagsHtml(item);
      DOM.tooltipTags.innerHTML = tagsHtml;
      DOM.tooltipTags.style.display = tagsHtml ? 'flex' : 'none';

      // 配方 (基础进化显示完整配方)
      let formulaHtml = '';
      if (item.row && item.col) {
        // 基础进化: 显示合成配方
        formulaHtml = buildFormulaHtml(item);
      }
      DOM.tooltipFormula.innerHTML = formulaHtml;
      DOM.tooltipFormula.style.display = formulaHtml ? 'flex' : 'none';

      // 高级进化/被动进化: 显示原料
      let materialsHtml = '';
      if (item.components) {
        if (isAdvancedEvolution(item)) {
          // 高级进化: 显示直接原料 (进化球) + 基础原料 (基础球)
          materialsHtml = buildDirectComponentsHtml(item) + buildBaseMaterialsHtml(item);
        } else {
          // 被动道具进化: 只显示组件 (基础装备)
          materialsHtml = buildDirectComponentsHtml(item);
        }
      }
      DOM.tooltipMaterials.innerHTML = materialsHtml;
      DOM.tooltipMaterials.style.display = materialsHtml ? 'block' : 'none';

      const isMobile = window.innerWidth < 768;
      
      // 先临时显示以获取实际尺寸
      DOM.tooltip.style.visibility = 'hidden';
      DOM.tooltip.style.top = '0';
      // 移动端不设置 left, 让 CSS 控制水平位置
      if (!isMobile) {
        DOM.tooltip.style.left = '0';
        DOM.tooltip.style.right = '';
      } else {
        DOM.tooltip.style.left = '';
        DOM.tooltip.style.right = '';
      }
      DOM.tooltip.classList.add('visible');

      // 获取目标和 tooltip 的实际尺寸
      const target = event.target.closest('th, .matrix-cell, .gallery-item, .advanced-card');
      if (!target) {
        DOM.tooltip.classList.remove('visible');
        DOM.tooltip.style.visibility = '';
        return;
      }
      
      const targetRect = target.getBoundingClientRect();
      const tooltipRect = DOM.tooltip.getBoundingClientRect();
      
      // 计算最终位置
      const pos = calcTooltipPosition(targetRect, tooltipRect);
      // 移动端只设置 top, 水平位置由 CSS 控制
      if (!isMobile) {
        DOM.tooltip.style.left = pos.left + 'px';
      }
      DOM.tooltip.style.top = pos.top + 'px';
      DOM.tooltip.style.visibility = '';
    }

    function hideTooltip() {
      DOM.tooltip.classList.remove('visible');
    }

    // ========== 弹窗 ==========
    // 生成弹窗中的组件球 HTML
    function comboBallHtml(item, clickable) {
      const onclick = clickable ? ` data-modal="${safeName(item.name)}"` : '';
      return `<div class="combo-ball"${onclick}>
        ${imgHtml(item.img, item.name)}
        <span>${getName(item)}</span>
      </div>`;
    }

    function openModal(name) {
      // 查找进化球或基础球或基础装备
      const evo = evoByName.get(name) || ballByName.get(name) || ballById.get(name) || itemByName.get(name);
      if (!evo) return;

      DOM.modalImg.src = getImg(evo.img);
      // 只显示当前语言的名称
      DOM.modalTitle.textContent = getName(evo);
      DOM.modalTitleCn.textContent = '';
      DOM.modalEffect.textContent = getEffect(evo);

      // 构建元数据 HTML
      let metaHtml = '';
      const texts = (I18N && I18N[currentLang]) ? I18N[currentLang] : {
        attrDamageType: '伤害类型',
        attrStatusEffect: '状态效果',
        attrAoeType: '范围类型',
        attrTags: '特性标签'
      };
      
      // 伤害类型
      const damageHtml = buildDamageTypesHtml(evo);
      if (damageHtml) {
        metaHtml += `<div class="modal-meta-section">
          <div class="modal-meta-title">${texts.attrDamageType}</div>
          ${damageHtml}
        </div>`;
      }
      
      // 状态效果
      const statusHtml = buildStatusEffectsHtml(evo);
      if (statusHtml) {
        metaHtml += `<div class="modal-meta-section">
          <div class="modal-meta-title">${texts.attrStatusEffect}</div>
          ${statusHtml}
        </div>`;
      }
      
      // AOE类型
      const aoeHtml = buildAoeHtml(evo);
      if (aoeHtml) {
        metaHtml += `<div class="modal-meta-section">
          <div class="modal-meta-title">${texts.attrAoeType}</div>
          ${aoeHtml}
        </div>`;
      }
      
      // 标签
      const tagsHtml = buildTagsHtml(evo);
      if (tagsHtml) {
        metaHtml += `<div class="modal-meta-section">
          <div class="modal-meta-title">${texts.attrTags}</div>
          <div class="modal-tags">${evo.tags.map(tag => 
            `<span class="modal-tag" style="background-color: ${tag.color}">${getTagName(tag)}</span>`
          ).join('')}</div>
        </div>`;
      }
      
      DOM.modalMeta.innerHTML = metaHtml;
      DOM.modalMetaSection.style.display = metaHtml ? 'block' : 'none';

      let formulaHtml = '';
      let hasFormula = false;
      
      if (evo.row && evo.col) {
        // 基础进化: 查找所有同名配方 (可能有多个替代配方)
        hasFormula = true;
        const allRecipes = EVOLUTIONS.filter(e => e.name === evo.name);
        
        allRecipes.forEach((recipe, idx) => {
          const ball1 = getBaseBall(recipe.row);
          const ball2 = getBaseBall(recipe.col);
          let recipeHtml = '';
          if (ball1) recipeHtml += comboBallHtml(ball1, false);
          recipeHtml += '<span class="combo-plus">+</span>';
          if (ball2) recipeHtml += comboBallHtml(ball2, false);
          recipeHtml += '<span class="combo-equals">=</span>';
          recipeHtml += comboBallHtml(recipe, false);
          
          // 多个配方时, 每个配方单独一行
          if (allRecipes.length > 1) {
            formulaHtml += `<div class="combo-formula-row">${recipeHtml}</div>`;
          }
          else {
            formulaHtml += recipeHtml;
          }
        });
      }
      else if (evo.components) {
        // 高级/被动进化: 多组件合成
        hasFormula = true;
        evo.components.forEach((comp, i) => {
          const c = findComponent(comp);
          if (c) {
            const isEvo = evoByName.has(comp);
            formulaHtml += comboBallHtml(c, isEvo);
          }
          else {
            formulaHtml += `<div class="combo-ball"><span>${comp}</span></div>`;
          }
          if (i < evo.components.length - 1) {
            formulaHtml += '<span class="combo-plus">+</span>';
          }
        });
        formulaHtml += '<span class="combo-equals">=</span>';
        formulaHtml += comboBallHtml(evo, false);
      }
      // 基础球和基础装备: 无合成配方, 只显示自身
      else {
        formulaHtml = comboBallHtml(evo, false);
      }

      DOM.modalFormula.innerHTML = formulaHtml;
      // 隐藏配方区域标题 (针对无配方的基础道具)
      const recipeSection = DOM.modalFormula.closest('.modal-section');
      if (recipeSection) {
        const title = recipeSection.querySelector('h4');
        if (title) {
          title.style.display = hasFormula ? 'block' : 'none';
        }
      }
      DOM.modalOverlay.classList.add('active');
    }

    function closeModal() {
      DOM.modalOverlay.classList.remove('active');
    }

    // ========== 筛选功能 ==========
    function applyFilter(filter) {
      currentFilter = filter;
      
      // 更新按钮状态
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.filter === filter);
      });
      
      // 矩阵视图 - 根据标签筛选
      document.querySelectorAll('.matrix-cell:not(.empty)').forEach(cell => {
        const evo = getEvolution(cell.dataset.evo);
        const match = filter === 'all' || (evo && matchesFilter(evo, filter));
        cell.style.opacity = match ? '1' : '0.15';
      });
      
      // 图鉴视图
      document.querySelectorAll('.gallery-item').forEach(item => {
        const tags = item.dataset.tags || '';
        const match = filter === 'all' || tags.includes(filter);
        item.style.display = match ? 'block' : 'none';
      });
      
      // 高级/被动区域
      document.querySelectorAll('.advanced-card').forEach(card => {
        const tags = card.dataset.tags || '';
        const match = filter === 'all' || tags.includes(filter);
        card.style.display = match ? 'flex' : 'none';
      });
      
      // 列表视图 - 根据内容匹配
      document.querySelectorAll('.list-card').forEach(card => {
        const combos = card.querySelectorAll('.combo-item');
        
        if (filter === 'all') {
          // 显示全部时, 恢复所有组合项的显示
          card.style.display = 'block';
          combos.forEach(combo => {
            combo.style.display = 'flex';
          });
          return;
        }
        
        // 检查卡片中的进化是否匹配
        let hasMatch = false;
        combos.forEach(combo => {
          const evo = getEvolution(combo.dataset.evo);
          if (evo && matchesFilter(evo, filter)) {
            hasMatch = true;
            combo.style.display = 'flex';
          }
          else {
            combo.style.display = 'none';
          }
        });
        card.style.display = hasMatch ? 'block' : 'none';
      });
    }

    // ========== 搜索 (带防抖) ==========
    function doSearch(query) {
      query = query.toLowerCase().trim();
      
      // 先重置筛选
      if (query) {
        document.querySelectorAll('.filter-btn').forEach(btn => {
          btn.classList.toggle('active', btn.dataset.filter === 'all');
        });
        currentFilter = 'all';
      }
      
      // 矩阵视图
      document.querySelectorAll('.matrix-cell:not(.empty)').forEach(cell => {
        const evoName = cell.dataset.evo?.toLowerCase() || '';
        const evo = getEvolution(cell.dataset.evo);
        const nameCn = evo?.nameCn?.toLowerCase() || '';
        cell.style.opacity = (query && !evoName.includes(query) && !nameCn.includes(query)) ? '0.2' : '1';
      });

      // 列表视图
      document.querySelectorAll('.list-card').forEach(card => {
        const match = !query || card.textContent.toLowerCase().includes(query);
        card.style.display = match ? 'block' : 'none';
        // 重置combo-item显示
        card.querySelectorAll('.combo-item').forEach(combo => {
          combo.style.display = 'flex';
        });
      });

      // 图鉴视图
      document.querySelectorAll('.gallery-item').forEach(item => {
        const match = !query || item.textContent.toLowerCase().includes(query);
        item.style.display = match ? 'block' : 'none';
      });

      // 高级/被动区域
      document.querySelectorAll('.advanced-card').forEach(card => {
        const match = !query || card.textContent.toLowerCase().includes(query);
        card.style.display = match ? 'flex' : 'none';
      });
    }

    // 防抖搜索
    function handleSearch(query) {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => doSearch(query), 150);
    }

    // ========== 视图切换 ==========
    function switchView(view) {
      currentView = view;
      
      // 按需渲染: 只有首次切换到该视图时才渲染
      renderView(view);
      
      document.querySelectorAll('.view-tab').forEach(tab => {
        tab.classList.toggle('active', tab.dataset.view === view);
      });

      document.querySelectorAll('.view-container').forEach(container => {
        container.classList.toggle('active', container.id === view + 'View');
      });

      // 图鉴视图和策略视图自带区域, 其他视图显示底部区域
      const showAdvanced = view !== 'gallery' && view !== 'strategy';
      DOM.advancedSection.style.display = showAdvanced ? 'block' : 'none';
      DOM.passiveSection.style.display = showAdvanced ? 'block' : 'none';
      
      // 策略视图隐藏球体筛选栏 (策略视图有自己的筛选栏)
      DOM.filterBar.style.display = view === 'strategy' ? 'none' : 'flex';
      
      // 切换视图后重新应用当前筛选 (策略视图有自己的筛选)
      if (view !== 'strategy') {
        applyFilter(currentFilter);
      }
    }

    // ========== 按需渲染指定视图 ==========
    function renderView(view) {
      if (viewRendered[view]) return;
      
      switch (view) {
        case 'matrix':
          renderMatrix();
          // 矩阵视图需要高级进化区
          renderAdvancedSections();
          break;
        case 'list':
          renderList();
          break;
        case 'gallery':
          renderGallery();
          break;
        case 'strategy':
          renderStrategy();
          break;
      }
      
      viewRendered[view] = true;
    }

    // ========== 渲染全部 (用于语言切换时强制重新渲染) ==========
    function renderAll() {
      // 重置渲染状态
      viewRendered.matrix = false;
      viewRendered.list = false;
      viewRendered.gallery = false;
      viewRendered.strategy = false;
      
      // 渲染当前视图
      renderView(currentView);
      
      // 高级进化区在非图鉴视图时都需要渲染
      if (currentView !== 'gallery' && currentView !== 'strategy') {
        renderAdvancedSections();
      }
    }

    // ========== 事件委托 ==========
    let currentHoverElement = null; // 追踪当前悬停的元素

    // 通用的悬停处理函数
    function handleMouseOver(e, selector, getNameAndType) {
      const target = e.target.closest(selector);
      if (!target) return;
      
      // 如果是同一个元素, 不重复处理
      if (target === currentHoverElement) return;
      
      currentHoverElement = target;
      const { name, type } = getNameAndType(target);
      if (name) showTooltip(e, name, type);
    }

    function handleMouseOut(e, selector) {
      const target = e.target.closest(selector);
      if (!target) return;
      
      // 检查 relatedTarget 是否仍在同一个元素内
      const relatedTarget = e.relatedTarget;
      if (relatedTarget && target.contains(relatedTarget)) return;
      
      // 真正离开了元素
      if (currentHoverElement === target) {
        currentHoverElement = null;
        hideTooltip();
      }
    }

    function setupEventDelegation() {
      // 矩阵表格: 悬停提示
      DOM.matrixTable.addEventListener('mouseover', (e) => {
        handleMouseOver(e, '[data-type]', (el) => ({
          type: el.dataset.type,
          name: el.dataset.type === 'base' ? el.dataset.id : el.dataset.evo
        }));
      });
      
      DOM.matrixTable.addEventListener('mouseout', (e) => {
        handleMouseOut(e, '[data-type]');
      });

      // 图鉴视图: 悬停提示
      const galleryContainer = document.getElementById('galleryView');
      galleryContainer.addEventListener('mouseover', (e) => {
        handleMouseOver(e, '.gallery-item', (el) => {
          const type = el.dataset.type;
          let name;
          if (type === 'base') {
            name = el.dataset.id;
          }
          else if (type === 'item') {
            name = el.dataset.item;
          }
          else {
            name = el.dataset.evo;
          }
          return { type, name };
        });
      });
      
      galleryContainer.addEventListener('mouseout', (e) => {
        handleMouseOut(e, '.gallery-item');
      });

      // 图鉴视图: 点击打开弹窗
      galleryContainer.addEventListener('click', (e) => {
        const item = e.target.closest('.gallery-item');
        if (!item) return;
        const type = item.dataset.type;
        let name;
        if (type === 'base') {
          name = item.dataset.id;
        }
        else if (type === 'item') {
          name = item.dataset.item;
        }
        else {
          name = item.dataset.evo;
        }
        if (name) openModal(name);
      });

      // 高级/被动区域: 悬停提示
      [DOM.advancedGrid, DOM.passiveGrid].forEach(grid => {
        grid.addEventListener('mouseover', (e) => {
          handleMouseOver(e, '.advanced-card', (el) => ({
            type: 'evo',
            name: el.dataset.evo
          }));
        });
        
        grid.addEventListener('mouseout', (e) => {
          handleMouseOut(e, '.advanced-card');
        });
      });

      // 列表视图: 切换分组模式
      document.querySelectorAll('.list-mode-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const mode = btn.dataset.mode;
          if (mode === listGroupMode) return;
          
          listGroupMode = mode;
          // 更新按钮状态
          document.querySelectorAll('.list-mode-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          // 重新渲染列表
          renderList();
        });
      });

      // 列表视图: 点击打开弹窗
      DOM.listContainer.addEventListener('click', (e) => {
        const item = e.target.closest('.combo-item');
        if (item && item.dataset.evo) openModal(item.dataset.evo);
      });

      // 弹窗内组件点击
      DOM.modalFormula.addEventListener('click', (e) => {
        const ball = e.target.closest('[data-modal]');
        if (ball) openModal(ball.dataset.modal);
      });
    }

    // ========== 初始化 ==========
    document.addEventListener('DOMContentLoaded', () => {
      buildIndexes();
      cacheDOM();
      updateUIText();
      renderView(currentView);
      setupEventDelegation();
      
      // 语言切换按钮
      document.getElementById('langSwitch').addEventListener('click', switchLanguage);

      // 视图切换
      document.querySelectorAll('.view-tab').forEach(tab => {
        tab.addEventListener('click', () => switchView(tab.dataset.view));
      });

      // 筛选按钮
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          // 清空搜索框
          DOM.searchInput.value = '';
          applyFilter(btn.dataset.filter);
        });
      });

      // 搜索 (防抖)
      DOM.searchInput.addEventListener('input', (e) => handleSearch(e.target.value));

      // 弹窗关闭
      document.getElementById('modalClose').addEventListener('click', closeModal);
      DOM.modalOverlay.addEventListener('click', (e) => {
        if (e.target === e.currentTarget) closeModal();
      });

      // ESC 关闭弹窗和提示框
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          closeModal();
          hideTooltip();
        }
      });
    });
  </script>

</body>
